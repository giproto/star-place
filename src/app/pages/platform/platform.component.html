<!-- Tela de menu toolbar -->
<header class="bg-gradient-to-r from-blue-500 to-blue-700 text-white p-shadow-1g">

    <!-- Título e subtítulo do toolbar -->
    <div class="text-center">
        <h1 class="text-3x1 font-bold">Star Place</h1>
        <p class="text-lg mt-2">Sua lista de lugares e preferências</p>
    </div>

    <!-- Linha de divisão das rotas -->
    <div class="mt-4">
        <hr class="border-t border-blue-300 opacity-50"/>
    </div>

    <!-- Ambiente de navegação -->
    <nav class="mt-4">
        <ul class="flex justify-center space-x-6 text-white font-semibold">

            <!-- Linha de Galeria -->
            <li>
                <a class="hover:text-yellow-300">Galeria</a>
            </li>

            <!-- Linha de Categorias -->
            <li>
                <a class="hover:text-yellow-300">Categorias</a>
            </li>

            <!-- Linha de Lugares -->
            <li>
                <a class="hover:text-yellow-300">Lugares</a>
            </li>

            <!-- Linha para Sair -->
            <li>
                <a class="hover:text-yellow-300">Sair</a>
            </li>
        </ul>
    </nav>
</header>

<!-- Rota para o ambiente de navegação -->
<router-outlet></router-outlet>

<!-- Tela de rodapé -->
<footer class="bg-gray-200 text-center p-4 mt-6">
    <p class="text-gray-600 text-sm">2025 Lugares e preferências. Todos os direitos reservados.</p>
</footer>
