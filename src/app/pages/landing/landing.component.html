<!-- Tela de autenticação de login -->
<div class="py-10 bg-gradient-to-r from-blue-500 to-blue-700 text-white flex flex-col justify-center items-center">

    <!-- Menu de acesso do perfil -->
    <div class="text-center px-6">

        <!-- Título e descrição da página -->
        <h1 class="text-4xl font-bold mb-4">Bem vindo à sua lista de lugares favoritos!</h1>
        <p class="text-lg mb-6">Explore, organize e compartilhe seus lugares preferidos. Tudo em um só lugar.</p>

        @if (isLoggedIn()) 
        {
            <!-- Botão de navegação do perfil -->
            <button
                class="bg-white text-blue-400 font-semibold py-3 px-8 rounded-full hover:bg-gray-100 flex space-x-3 items-center"
                (click)="browseProfile()">
                Olá {{ profile?.name }}, clique aqui para aproveitar o site 
            </button>
        }
        @else
        {
            <!-- Botão para logar com o Google -->
            <button
                class="bg-white text-blue-700 font-semibold py-3 px-8 rounded-full hover:bg-gray-100 flex space-x-3 items-center"
                (click)="loginWithGoogle()">
                <img 
                    width="50px"
                    src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png"
                />
                Logar com o Google
            </button>
        }
    </div>
</div>
